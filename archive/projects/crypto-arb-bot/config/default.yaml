runtime:
  paper_mode: true
  live_enabled: false
  market_data_mode: rest  # ws | rest (ws scaffold exists, rest is robust fallback)
  stale_book_ms: 1500
  max_cross_exchange_skew_ms: 500
  poll_sec: 2

exchanges:
  buy:
    id: kraken
    api_key: ${KRAKEN_API_KEY}
    api_secret: ${KRAKEN_API_SECRET}
  sell:
    id: coinbase
    api_key: ${COINBASE_API_KEY}
    api_secret: ${COINBASE_API_SECRET}

market:
  symbol: BTC/USD
  trade_size_base: 0.05
  min_notional_quote: 10.0
  lot_size_step: 0.0001

costs:
  taker_fee_buy: 0.0026
  taker_fee_sell: 0.0040
  maker_fee_buy: 0.0016
  maker_fee_sell: 0.0025
  withdrawal_fee_quote: 15.0
  network_fee_quote: 5.0
  slippage_bps: 2.5
  latency_penalty_bps: 1.0

risk:
  max_position_base: 0.2
  max_daily_loss_quote: 500.0
  max_open_orders: 5
  kill_switch: false
  circuit_breaker_failures: 3
  max_inventory_skew_base: 0.4
  max_order_age_ms: 10000
  volatility_pause_bps: 80
  pause_on_connection_unhealthy: true

sim:
  initial_quote_buy_ex: 200000.0
  initial_base_buy_ex: 0.0
  initial_quote_sell_ex: 10000.0
  initial_base_sell_ex: 2.0
