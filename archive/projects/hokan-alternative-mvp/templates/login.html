<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><title>Login</title></head>
<body>
  <h2>Insurance Agency MVP Login</h2>
  {% with messages = get_flashed_messages() %}
    {% if messages %}<p style="color:red">{{ messages[0] }}</p>{% endif %}
  {% endwith %}
  <form method="post">
    <div><input name="username" placeholder="username" required></div>
    <div><input name="password" type="password" placeholder="password" required></div>
    <button type="submit">Login</button>
  </form>
  <p>初期ユーザー: admin / admin1234</p>
</body>
</html>
