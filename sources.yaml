# sources.yaml
# 監視・要約の対象ソース一覧（もんちゃんが随時メンテできるようにする）
# - 原則：ソースごとに「取得方法」「頻度」「出典URL」「注意点」を明記
# - 追加/変更はこのファイルを更新して反映

sources:
  - id: nikkei
    name: 日本経済新聞（NIKKEI）
    kind: website
    urls:
      - https://www.nikkei.com/
      - https://www.nikkei.com/news/category/
      - https://www.nikkei.com/markets/
    access:
      auth_required: false   # 有料本文まで要約する場合は true にして別途手段を指定
      method: web_fetch      # web_fetch | browser | rss | api
    schedule:
      cadence: daily
      default_count: 8
    output:
      language: ja
      style: bullets
    notes:
      - "未ログインだと取得できるのは見出し/冒頭中心。" 

  - id: nikkin
    name: ニッキンONLINE
    kind: website
    urls:
      - https://www.nikkinonline.com/
    access:
      auth_required: true
      method: browser        # cookie維持で本文取得を狙う（切れたらフォールバック）
    schedule:
      cadence: daily
      default_count: 8
    output:
      language: ja
      style: bullets
    notes:
      - "有料会員ログイン前提。ログイン切れ時は見出しのみで送る。"

# 追加の候補はここに追記していく
